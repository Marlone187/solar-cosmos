<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Solar Cosmos</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        #controls {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 360px;
            padding: 0;
            box-sizing: border-box;
            background: transparent;
            backdrop-filter: none;
            border: none;
            border-radius: 0;
            box-shadow: none;
            color: #fff;
            z-index: 100;
            display: grid;
            grid-template-columns: 100px 250px;
            column-gap: 10px;
            row-gap: 12px;
            align-items: center;
            transform: scale(0.88);
            transform-origin: top left;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        #controls.hidden {
            opacity: 0;
            transform: translateX(-20px) scale(0.88);
            pointer-events: none;
        }

        #controls.cinematic-hidden {
            opacity: 0;
            transform: translateX(-20px) scale(1);
            pointer-events: none;
        }

        #controls h2 {
            grid-column: 1 / -1;
            margin: 0;
            padding: 0 0 12px 0;
            width: 100%;
            font-size: 2.95rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0px;
            text-transform: uppercase;
            color: #ffffff;
            border-bottom: 1px solid rgba(255,255,255,0.14);
            text-shadow: none;
            box-sizing: border-box;
            white-space: nowrap;
            text-align: left;
            display: block;
            overflow: visible;
            transform: none;
        }

        .theme-selector {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(4, 72px);
            justify-content: space-between;
            align-items: center;
            gap: 12px 0;
            padding: 4px 0 12px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 2px;
            width: 100%;
            box-sizing: border-box;
        }

        .bubble {
            position: relative;
            width: 72px;
            height: 72px;
            justify-self: center;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: none;
            filter: none;
            overflow: hidden;
            background-clip: padding-box;
        }

        .bubble:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.35);
        }

        .bubble.active {
            box-shadow: 0 0 0 3px #ffffff;
        }

        .control-group {
            display: contents;
        }

        label {
            display: flex;
            align-items: center;
            width: 100px;
            min-width: 100px;
            max-width: 100px;
            min-height: 10px;
            font-size: 0.84rem;
            font-weight: 500;
            line-height: 1;
            letter-spacing: 1.0px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.88);
            white-space: nowrap;
        }

        .slider-shell {
            position: relative;
            width: 250px;
            min-width: 250px;
            max-width: 250px;
            height: 12px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex: 0 0 250px;
        }

        .custom-slider-track {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 10px;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.12);
            overflow: hidden;
            pointer-events: none;
        }

        .custom-slider-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: rgba(255,255,255,0.96);
            pointer-events: none;
        }

        .custom-slider-thumb {
            display: none;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            height: 16px;
            margin: 0;
            padding: 0;
            opacity: 0;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            z-index: 3;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 20px;
            background: transparent;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 20px;
            background: transparent;
            border: none;
        }

        input[type="range"]::-moz-range-track {
            height: 20px;
            background: transparent;
            border: none;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 20px;
            background: transparent;
            border: none;
        }

        input[type="range"]::-moz-range-progress {
            background: transparent;
            border: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        .controls-footer {
            grid-column: 1 / -1;
            margin-top: 6px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.14);
        }

        .hotkeys-toggle {
            position: relative;
            width: 100%;
            display: block;
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0 0 4px 0;
            margin: 0;
            color: rgba(255,255,255,0.92);
            font-size: 0.84rem;
            line-height: 1;
            letter-spacing: 1.0px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: none;
            box-sizing: border-box;
            text-align: left;
        }

        .hotkeys-toggle:hover {
            opacity: 0.9;
        }

        .hotkeys-toggle .arrow {
            position: absolute;
            right: -2px;
            top: 0;
            display: block;
            width: 18px;
            min-width: 18px;
            text-align: right;
            font-size: 1.25rem;
            line-height: 1;
            color: #ffffff;
            transition: transform 0.22s ease;
        }

        .controls-footer.open .hotkeys-toggle .arrow {
            transform: rotate(180deg);
        }

        .hotkeys-content {
            display: none;
            margin-top: 4px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .controls-footer.open .hotkeys-content {
            display: block;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.14);
        }

        .hotkey-row {
            display: grid;
            grid-template-columns: 100px 250px;
            column-gap: 10px;
            align-items: center;
            padding: 4px 0;
            font-size: 0.84rem;
            line-height: 1;
            letter-spacing: 1.0px;
            color: rgba(255,255,255,0.88);
        }

        .hotkey-row + .hotkey-row {
            margin-top: 3px;
        }

        .hotkey-key {
            display: block;
            width: 100px;
            min-width: 100px;
            max-width: 100px;
            color: rgba(255,255,255,0.88);
            font-weight: 500;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .hotkey-desc {
            display: block;
            width: 250px;
            min-width: 250px;
            max-width: 250px;
            padding: 0;
            color: rgba(255,255,255,0.92);
            border: none;
            background: transparent;
            box-sizing: border-box;
        }

        #b-standard   { background: linear-gradient(135deg, #ff6a00, #00eaff, #b400ff); }
        #b-rainbow    { background: conic-gradient(from 210deg, #ff3b3b, #ffd83b, #3bff77, #3be7ff, #4975ff, #da4dff, #ff3b3b); }
        #b-monochrome { background: linear-gradient(135deg, #b6ffff, #008b8b, #042b30); }
        #b-hulk       { background: linear-gradient(135deg, #00ff66, #89ff00, #ff7b00); }
        #b-solarflare { background: linear-gradient(135deg, #fff1a8, #ff7a00, #ff1f4b); }
        #b-nebula     { background: linear-gradient(135deg, #4e2dff, #d02fff, #72f2ff); }
        #b-icecore    { background: linear-gradient(135deg, #e8ffff, #77e6ff, #007dff); }
        #b-ember      { background: linear-gradient(135deg, #ffffff, #8f8f8f, #111111); }

        #rec-indicator {
            position: absolute; top: 20px; right: 20px; color: #ff0000; font-weight: bold;
            display: none; align-items: center; gap: 15px; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 30px; border: 1px solid #ff0000;
            z-index: 200; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        #cin-timer {
            display: none !important;
            position: absolute; bottom: 24px; right: 24px; box-sizing: border-box;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            padding: 14px 18px; color: #fff; font-size: 22px;
            display: none; flex-direction: column; gap: 8px;
            z-index: 200; min-width: 430px;
            transform: scale(1.0);
            transform-origin: bottom right;
        }
        #cin-timer .phase-name { font-size: 22px; letter-spacing: 3px; color: #00ffff; text-transform: uppercase; font-weight: 300; }
        #cin-timer .time-row { display: flex; justify-content: space-between; align-items: center; }
        #cin-timer .t-big { font-size: 52px; font-weight: 600; letter-spacing: 1px; }
        #cin-timer .t-total { font-size: 18px; color: #666; }
        #cin-timer .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        #cin-timer .bar-fill { height: 100%; background: #00ffff; border-radius: 2px; transition: width 0.1s linear; }
        #cin-timer .phase-bar-bg { width: 100%; height: 7px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        #cin-timer .phase-bar-fill { height: 100%; background: rgba(0,255,255,0.4); border-radius: 2px; transition: width 0.1s linear; }
        #cin-timer .labels { display: flex; justify-content: space-between; font-size: 14px; color: #444; margin-top: -4.5px; }
        #cin-timer .skip-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #888; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; border-radius: 6px; padding: 5px 10px; cursor: pointer; text-align: center; transition: background 0.2s; }
        #cin-timer .skip-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    </style>
</head>
<body>

<div id="rec-indicator">● RECORDING</div>
<audio id="cinematic-audio" src="cinematic_music.mp3" preload="auto"></audio>
<audio id="after-cinematic-audio" src="after_cinematic_music.mp3" preload="auto" loop></audio>
<audio id="intro-start-audio" src="start_scene_music.mp3" preload="auto"></audio>

<div id="cin-timer">
    <div class="phase-name" id="ct-phase">—</div>
    <div class="time-row">
        <span class="t-big" id="ct-time">0.0s</span>
        <span class="t-total" id="ct-total">/ 95s</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="ct-bar" style="width:0%"></div></div>
    <div class="labels"><span>0s</span><span>95s</span></div>
    <div class="phase-name" style="color:#888;font-size:9px;margin-top:2px;">Phase-Fortschritt</div>
    <div class="phase-bar-bg"><div class="phase-bar-fill" id="ct-pbar" style="width:0%"></div></div>
    <div class="skip-btn" id="ct-skip">⏭ Nächste Phase</div>
</div>

<div id="controls" class="cinematic-hidden">
    <h2>SOLAR COSMOS</h2>

    <div class="theme-selector">
        <div class="bubble active" id="b-standard" data-theme="standard" title="Standard"></div>
        <div class="bubble" id="b-rainbow" data-theme="rainbow" title="Rainbow"></div>
        <div class="bubble" id="b-monochrome" data-theme="monochrome" title="Monochrome"></div>
        <div class="bubble" id="b-hulk" data-theme="hulk" title="Hulk"></div>
        <div class="bubble" id="b-solarflare" data-theme="solarflare" title="Solar Flare"></div>
        <div class="bubble" id="b-nebula" data-theme="nebula" title="Nebula"></div>
        <div class="bubble" id="b-icecore" data-theme="icecore" title="Ice Core"></div>
        <div class="bubble" id="b-ember" data-theme="ember" title="Schwarz / Weiß / Grau"></div>
    </div>

    <div class="control-group"><label>Sonne</label><div class="slider-shell"><input autocomplete="off" type="range" id="sunSize" min="10" max="350" value="80"></div></div>
    <div class="control-group"><label>Speed</label><div class="slider-shell"><input autocomplete="off" type="range" id="speed" min="0" max="100" value="12"></div></div>
    <div class="control-group"><label>Planeten</label><div class="slider-shell"><input autocomplete="off" type="range" id="maxOrbits" min="10" max="400" value="120"></div></div>
    <div class="control-group"><label>Beleuchtung</label><div class="slider-shell"><input autocomplete="off" type="range" id="lineOpacity" min="0" max="100" value="25"></div></div>
    <div class="control-group"><label>Stauchung</label><div class="slider-shell"><input autocomplete="off" type="range" id="tightness" min="0" max="150" value="40"></div></div>
    <div class="control-group"><label>3D Twist</label><div class="slider-shell"><input autocomplete="off" type="range" id="twist" min="0" max="400" value="120"></div></div>

    <div class="controls-footer" id="hotkeys-panel">
        <button type="button" class="hotkeys-toggle" id="hotkeys-toggle" aria-expanded="false">
            <span>Hotkeys</span>
            <span class="arrow">▾</span>
        </button>

        <div class="hotkeys-content" id="hotkeys-content">
            <div class="hotkey-row"><span class="hotkey-key">V</span><span class="hotkey-desc">Video aufnehmen</span></div>
            <div class="hotkey-row"><span class="hotkey-key">S</span><span class="hotkey-desc">Screenshot aufnehmen</span></div>
            <div class="hotkey-row"><span class="hotkey-key">C</span><span class="hotkey-desc">Cinematic Starten</span></div>
            <div class="hotkey-row"><span class="hotkey-key">O</span><span class="hotkey-desc">Menü ein/ausblenden</span></div>
            <div class="hotkey-row"><span class="hotkey-key">M</span><span class="hotkey-desc">Musik aus/an</span></div>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let currentTheme = 'standard';
    let isCinematic = false;
    let cinTimerVisible = false;
    let introIdleMode = true;
    let cinTime = 0;
    const camLerpPos  = new THREE.Vector3();
    const camLerpLook = new THREE.Vector3();
    let cinStarted = false;
    let cinModelStart = null;
    let cinModelCurrent = null;
    let cinModelUiTimer = 0;
    let cinStructureTime = 0;
    let cinematicOverlayRestoreTimer = null;
    let cinematicMusicStarted = false;
    let holdFinalCinematicFrame = false;
    let finalCinematicOrbitTime = 0;
    let finalCinematicModel = null;
    const finalCinematicCameraPos = new THREE.Vector3();
    const finalCinematicCameraLook = new THREE.Vector3();
    const PHASE0_MODEL_ROTATION_OFFSET = 3.0;
    const START_VIEW_POS = new THREE.Vector3(0, 26000, 42000);
    const START_CLOSE_POS = new THREE.Vector3(0, 850, 0);
    const START_VIEW_LOOK = new THREE.Vector3(0, 0, 0);
    const DEFAULT_SPACING = 45;
    const MODEL2_PRESET = { sunSize: 80, maxOrbits: 120, lineOpacity: 25, tightness: 40, twist: 60 };
    const MODEL3_PRESET = { sunSize: 80, maxOrbits: 120, lineOpacity: 25, tightness: 40, twist: 400 };
    const MODEL_KEYS = ['sunSize', 'maxOrbits', 'lineOpacity', 'tightness', 'twist'];
    const DEFAULT_UI_VALUES = {
        sunSize: 80,
        speed: 12,
        maxOrbits: 120,
        lineOpacity: 25,
        tightness: 40,
        twist: 120
    };
    // Audio
    const cinTimer  = document.getElementById('cin-timer');
    const ctPhase   = document.getElementById('ct-phase');
    const ctTime    = document.getElementById('ct-time');
    const ctTotal   = document.getElementById('ct-total');
    const ctBar     = document.getElementById('ct-bar');
    const ctPbar    = document.getElementById('ct-pbar');
    const ctSkip    = document.getElementById('ct-skip');
    const cinAudio  = document.getElementById('cinematic-audio');
    const introStartAudio = document.getElementById('intro-start-audio');
    const afterCinematicAudio = document.getElementById('after-cinematic-audio');

    let introAudioStarted = false;
    let afterCinematicStarted = false;
    let musicMuted = false;

    function startIntroStartAudio() {
        if (!introStartAudio || !introIdleMode || isCinematic) return;

        introStartAudio.volume = 0.75;
        introStartAudio.muted = musicMuted;
        introStartAudio.loop = true;
        if (introStartAudio.paused) {
            introStartAudio.play().catch(() => {});
        }

        introAudioStarted = true;
    }

    function stopIntroStartAudio() {
        if (!introStartAudio) return;

        introStartAudio.pause();
        introStartAudio.currentTime = 0;
        introAudioStarted = false;
    }

    function startAfterCinematicMusic() {
        if (!afterCinematicAudio || afterCinematicStarted) return;

        afterCinematicAudio.currentTime = 0;
        afterCinematicAudio.muted = musicMuted;
        afterCinematicAudio.volume = 0.07;
        afterCinematicAudio.loop = true;
        afterCinematicAudio.play().catch(() => {});
        afterCinematicStarted = true;
    }

    function stopAfterCinematicMusic() {
        if (!afterCinematicAudio) return;

        afterCinematicAudio.pause();
        afterCinematicAudio.currentTime = 0;
        afterCinematicStarted = false;
    }

    function setAllMusicMuted(muted) {
        musicMuted = muted;

        [introStartAudio, cinAudio, afterCinematicAudio].forEach(audio => {
            if (audio) audio.muted = musicMuted;
        });
    }

    function toggleMusicMuted() {
        setAllMusicMuted(!musicMuted);
    }

    const CIN_AUDIO_MAX_VOLUME = 0.85;
    const CIN_AUDIO_FADE_START = 99.75;
    const CIN_AUDIO_STOP_AT = 103.25;
    const AFTER_CINEMATIC_UI_DELAY = 7000;

    const TOTAL_DUR = 102.5;
    const INTRO_TO_PHASE0_HOLD_END = 10.0;
    const STRUCTURE_FREEZE_UNTIL = 25.0;
    const PHASE_DEFS = [
        { name: 'INTRO — Sonnenaufbau',         start: 0,   end: 10 },
        { name: 'START — 90° Spiral-Abstieg',   start: 10,  end: 25 },
        { name: 'PHASE 1 — 360° Orbit',         start: 25,  end: 35 },
        { name: 'PHASE 2 — Abstieg 360°',       start: 35,  end: 55 },
        { name: 'PHASE 3 — Kern-Spirale',       start: 55,  end: 70 },
        { name: 'PHASE 4 — Transformation',     start: 70,  end: 80 },
        { name: 'PHASE 5 — Aufstieg',           start: 80,  end: 95 },
        { name: 'ENDE / PHASE 6 — Finale',      start: 95,  end: 102.5 },
    ];
    ctTotal.textContent = `/ ${TOTAL_DUR}s`;

    function updateTimer() {
        const T = cinTime;
        const phase = PHASE_DEFS.find(p => T >= p.start && T < p.end) || PHASE_DEFS[PHASE_DEFS.length - 1];
        const pProgress = (T - phase.start) / (phase.end - phase.start);
        ctPhase.textContent = phase.name;
        ctTime.textContent  = T.toFixed(1) + 's';
        ctBar.style.width   = Math.min(T / TOTAL_DUR * 100, 100).toFixed(1) + '%';
        ctPbar.style.width  = Math.min(pProgress * 100, 100).toFixed(1) + '%';
    }

    ctSkip.addEventListener('click', () => {
        if (!isCinematic) return;
        const T = cinTime;
        const idx = PHASE_DEFS.findIndex(p => T >= p.start && T < p.end);
        if (idx >= 0 && idx < PHASE_DEFS.length - 1) {
            cinTime = PHASE_DEFS[idx + 1].start;
        }
    });

    function startCinematicMusic(startMuted = false) {
        if (!cinAudio) return;
        cinAudio.currentTime = 0;
        cinAudio.muted = musicMuted;
        cinAudio.volume = startMuted ? 0.0001 : CIN_AUDIO_MAX_VOLUME;
        cinAudio.play().catch(() => {});
    }

    function stopCinematicMusic() {
        if (!cinAudio) return;
        cinAudio.pause();
        cinAudio.currentTime = 0;
        cinAudio.volume = CIN_AUDIO_MAX_VOLUME;
    }

    function updateCinematicMusicFade() {
        if (!cinAudio || !isCinematic) return;

        if (cinTime >= CIN_AUDIO_STOP_AT) {
            stopCinematicMusic();
            return;
        }

        if (cinTime >= CIN_AUDIO_FADE_START) {
            const p = clamp01((cinTime - CIN_AUDIO_FADE_START) / (CIN_AUDIO_STOP_AT - CIN_AUDIO_FADE_START));
            const fade = 1 - smoother(p);
            cinAudio.volume = Math.max(0.0001, CIN_AUDIO_MAX_VOLUME * fade);
        } else {
            cinAudio.volume = CIN_AUDIO_MAX_VOLUME;
        }
    }

    function setStructureVisibility(visible) {
        for (let arm = 0; arm < 3; arm++) {
            planetArms[arm]?.forEach(p => p.visible = visible);
            if (lineArms[arm]) lineArms[arm].visible = visible;
            if (glowPointArms[arm]) glowPointArms[arm].visible = visible;
        }
    }

    // Cinematic
    function startCinematicSequence() {
        stopAfterCinematicMusic();
        stopIntroStartAudio();
        introIdleMode = false;
        holdFinalCinematicFrame = false;
        finalCinematicModel = null;
        isCinematic = true;
        controls.enabled = false;

        if (cinematicOverlayRestoreTimer) {
            clearTimeout(cinematicOverlayRestoreTimer);
            cinematicOverlayRestoreTimer = null;
        }
        controlsPanel.classList.add('cinematic-hidden');

        cinTime = 0;
        cinStarted = false;
        cinematicMusicStarted = false;
        cinModelStart = readModelFromSliders();
        cinModelCurrent = { ...cinModelStart };
        cinModelUiTimer = 0;
        cinStructureTime = totalTime + PHASE0_MODEL_ROTATION_OFFSET;
        cinTimer.style.display = 'none';
        setStructureVisibility(true);
        startCinematicMusic();
        cinematicMusicStarted = true;
    }

    function stopCinematicSequence() {
        stopAfterCinematicMusic();
        finalCinematicOrbitTime = cinStructureTime;
        totalTime = finalCinematicOrbitTime;
        cinStructureTime = finalCinematicOrbitTime;
        holdFinalCinematicFrame = false;

        finalCinematicModel = cinModelCurrent ? { ...cinModelCurrent } : readModelFromSliders();
        applyModelToUi(finalCinematicModel, 0, true);
        finalCinematicCameraPos.copy(camera.position);
        finalCinematicCameraLook.copy(camLerpLook);

        isCinematic = false;
        controls.enabled = true;

    function createSubtleStars() {

    function getGradientColor(arm, ratio, angle = 0) {

    // Modell

    function ease(p) { return p * p * (3 - 2 * p); }
    function smoother(p) { return p * p * p * (p * (p * 6 - 15) + 10); }
    function clamp01(v) { return Math.min(Math.max(v, 0), 1); }

    function readModelFromSliders() {
        const model = {};
        MODEL_KEYS.forEach(id => model[id] = parseFloat(document.getElementById(id).value));
        return model;
    }

    function blendModel(a, b, p) {
        const q = smoother(clamp01(p));
        const out = {};
        MODEL_KEYS.forEach(id => out[id] = a[id] + (b[id] - a[id]) * q);
        return out;
    }

    function applyModelToUi(model, delta, force = false) {
        cinModelUiTimer += delta;
        if (!force && cinModelUiTimer < 0.10) return;

        MODEL_KEYS.forEach(id => {
            const el = document.getElementById(id);
            if (el && model[id] !== undefined) {
                el.value = model[id];
                if (typeof updateSliderFill === 'function') updateSliderFill(el);
            }
        });

        cinModelUiTimer = 0;
    }

    function updateCinematicModel(delta) {
        if (!isCinematic) {
            if (!holdFinalCinematicFrame) {
                cinModelCurrent = readModelFromSliders();
            }
            return;
        }
        if (!cinModelStart) cinModelStart = readModelFromSliders();

        if (cinTime < 70) {
            cinModelCurrent = { ...cinModelStart };
        } else if (cinTime < 80) {
            cinModelCurrent = blendModel(cinModelStart, MODEL2_PRESET, (cinTime - 70) / 10);
        } else if (cinTime < 95) {
            cinModelCurrent = { ...MODEL2_PRESET };
        } else {
            cinModelCurrent = blendModel(MODEL2_PRESET, MODEL3_PRESET, (cinTime - 95) / 8.5);
        }
        applyModelToUi(cinModelCurrent, delta, cinTime >= TOTAL_DUR);
    }

    function functionEaseModelValue(id) {
        return cinModelCurrent ? cinModelCurrent[id] : parseFloat(document.getElementById(id).value);
    }

    // Animation
    function update() {
        const delta = clock.getDelta();
        updateCinematicModel(delta);

        const sSize = functionEaseModelValue('sunSize');
        const sSpeed = parseFloat(document.getElementById('speed').value) / 600;
        const mOrbits = Math.round(functionEaseModelValue('maxOrbits'));
        const gap = DEFAULT_SPACING;
        const tTight = functionEaseModelValue('tightness') / 100;
        const tTwist = functionEaseModelValue('twist') / 1000;
        const lOpacity = functionEaseModelValue('lineOpacity') / 100;
        const activeSpeed = (introIdleMode && !isCinematic) ? (12 / 600) : sSpeed;
        totalTime += delta * activeSpeed * 15;

        if (sun.geometry.parameters.radius !== sSize) createSun();
        if (planetArms[0].length !== mOrbits) initPlanets();
        if (introIdleMode && !isCinematic) {
            setStructureVisibility(false);
            const sunPulse = 1 + Math.sin(totalTime * 2.4) * 0.16;
            sun.scale.setScalar(sunPulse);

            camera.position.copy(START_CLOSE_POS);
            camera.lookAt(START_VIEW_LOOK);
            cinStructureTime = totalTime + PHASE0_MODEL_ROTATION_OFFSET;
        } else {
            sun.scale.setScalar(1);
        }

        const buildProgress = isCinematic && cinTime < 8.5 ? smoother(clamp01(cinTime / 8.5)) : 1;

        let orbitTime = totalTime;
        if (isCinematic) {
            if (cinTime < STRUCTURE_FREEZE_UNTIL) {
                orbitTime = cinStructureTime;
            } else {
                cinStructureTime += delta * sSpeed * 15;
                orbitTime = cinStructureTime;
            }
        } else if (holdFinalCinematicFrame) {
            orbitTime = finalCinematicOrbitTime;
            cinStructureTime = finalCinematicOrbitTime;
        } else {
            orbitTime = totalTime;
            cinStructureTime = totalTime;
        }

        for (let arm = 0; arm < 3; arm++) {
            const curvePoints = [];
            planetArms[arm].forEach((planet, i) => {
                const orbit = i + 1;
                const radius = sSize + Math.pow(orbit, 1.75) * (gap / 10);
                const angle = (arm * Math.PI * 2 / 3) + (orbit * tTight) + (orbitTime / Math.pow(orbit + 2, 0.45));
                const twistAngle = orbit * tTwist;
                const x = Math.cos(angle) * radius * Math.cos(twistAngle), y = Math.sin(angle) * radius, z = Math.cos(angle) * radius * Math.sin(twistAngle);
                planet.position.set(x, y, z);
                planet.material.color.copy(getGradientColor(arm, i / mOrbits, angle));
                const ratio = i / Math.max(mOrbits - 1, 1);
                const reveal = isCinematic && cinTime < 10
                    ? clamp01((buildProgress - ratio) / 0.10)
                    : 1;

                planet.material.opacity = 0.95 * reveal;
                planet.scale.setScalar(0.35 + 0.65 * reveal);
                planet.visible = reveal > 0.01 && (!introIdleMode || isCinematic);

                curvePoints.push(new THREE.Vector3(x, y, z));
            });

            const curve = new THREE.CatmullRomCurve3(curvePoints, false, 'catmullrom', 0.5);
            const numSegments = (isCinematic && cinTime >= 60 && cinTime <= 95) ? 1000 : 2200;
            const smoothPoints = curve.getPoints(numSegments);
            const buildPointCount = isCinematic && cinTime < 10
                ? Math.max(4, Math.floor(smoothPoints.length * buildProgress))
                : smoothPoints.length;

            const posAttr = [], colAttr = [];
            for (let idx = 0; idx < buildPointCount; idx++) {
                const p = smoothPoints[idx];
                posAttr.push(p.x, p.y, p.z);
                const ratio = idx / Math.max(buildPointCount - 1, 1);
                const col = getGradientColor(arm, ratio, (arm * Math.PI * 2 / 3) + (ratio * mOrbits * tTight));
                colAttr.push(col.r, col.g, col.b);
            }

            const positionBuffer = new THREE.Float32BufferAttribute(posAttr, 3);
            const colorBuffer = new THREE.Float32BufferAttribute(colAttr, 3);

            lineArms[arm].geometry.setAttribute('position', positionBuffer);
            lineArms[arm].geometry.setAttribute('color', colorBuffer);
            lineArms[arm].material.opacity = lOpacity * (0.04 + 0.96 * buildProgress);
            lineArms[arm].visible = buildPointCount > 3 && (!introIdleMode || isCinematic);
            lineArms[arm].geometry.attributes.position.needsUpdate = true;

            glowPointArms[arm].geometry.setAttribute('position', positionBuffer.clone());
            glowPointArms[arm].geometry.setAttribute('color', colorBuffer.clone());
            glowPointArms[arm].material.opacity = Math.min(lOpacity * 1.15, 0.55) * (0.08 + 0.92 * buildProgress);
            glowPointArms[arm].visible = buildPointCount > 3 && (!introIdleMode || isCinematic);
            glowPointArms[arm].geometry.attributes.position.needsUpdate = true;
        }
        if (isCinematic) {
            if (!cinStarted) {
                camLerpPos.copy(START_CLOSE_POS);
                camLerpLook.copy(START_VIEW_LOOK);
                camera.position.copy(camLerpPos);
                camera.lookAt(camLerpLook);
                cinStarted = true;
            }

            cinTime += delta;

            updateCinematicMusicFade();

            const T = cinTime;
            let rawPos, rawLook;
            const START_TOP_H = 55000;
            const START_END_H = 22000;
            const START_END_R = 9000;
            const START_TURNS = Math.PI * 2.0;
            const START_END_A = START_TURNS;

            const PHASE1_DUR = 10;
            const PHASE1_END_R = 18000;
            const PHASE1_END_H = 12000;
            const PHASE1_END_A = START_END_A + Math.PI * 2;

            const PHASE2_DUR = 20;
            const PHASE2_END_R = 9000;
            const PHASE2_END_H = 350;
            const PHASE2_END_A = PHASE1_END_A + Math.PI * 2;

            const PHASE3_DUR = 15;
            const PHASE3_END_R = 900;
            const PHASE3_END_H = 1750;
            const PHASE3_END_A = PHASE2_END_A + 1.35;

            const PHASE4_DUR = 10;
            const PHASE4_END_A = PHASE3_END_A + 3.5;

            const PHASE5_DUR = 15;
            const PHASE5_END_R = 12900;
            const PHASE5_END_H = 10000;
            const PHASE5_END_A = PHASE4_END_A + 3.0;

            function phaseLookAt(a, r, h) {
                const lookR = r * 0.22;
                return new THREE.Vector3(Math.cos(a + 0.45) * lookR, h * 0.025, Math.sin(a + 0.45) * lookR);
            }

            if (T < 10.0) {
                const p = smoother(clamp01(T / 10.0));

                const pullBackPos = START_VIEW_POS.clone();
                rawPos  = START_CLOSE_POS.clone().lerp(pullBackPos, p);
                rawLook = START_VIEW_LOOK.clone();

            } else if (T < 16.0) {
                const t = T - 10.0;
                const p = smoother(clamp01(t / 6.0));

                const from = START_VIEW_POS.clone();
                const to   = new THREE.Vector3(0, 44500, 2400);

                rawPos  = from.lerp(to, p);
                rawLook = START_VIEW_LOOK.clone();

            } else if (T < 25) {
                const t = T - 16.0;
                const p = smoother(clamp01(t / 9.0));

                const from = new THREE.Vector3(0, 44500, 2400);
                const to = new THREE.Vector3(
                    Math.cos(START_END_A) * START_END_R,
                    START_END_H,
                    Math.sin(START_END_A) * START_END_R
                );

                rawPos = from.lerp(to, p);
                rawLook = START_VIEW_LOOK.clone();

            } else if (T < 35) {
                const t = T - 25;
                const p = smoother(t / PHASE1_DUR);
                const a = START_END_A + (PHASE1_END_A - START_END_A) * p;
                const r = START_END_R + (PHASE1_END_R - START_END_R) * p;
                const h = START_END_H + (PHASE1_END_H - START_END_H) * p;
                const lookBlend = smoother(clamp01((t - 2) / 8));
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = new THREE.Vector3(0, 0, 0).lerp(phaseLookAt(a, r, h), lookBlend);

            } else if (T < 55) {
                const t = T - 35;
                const p = smoother(t / PHASE2_DUR);
                const a = PHASE1_END_A + (PHASE2_END_A - PHASE1_END_A) * p;
                const r = PHASE1_END_R + (PHASE2_END_R - PHASE1_END_R) * p;
                const h = PHASE1_END_H + (PHASE2_END_H - PHASE1_END_H) * p;
                const lookToCenter = smoother(clamp01((t - 14) / 6));
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = phaseLookAt(a, r, h).lerp(new THREE.Vector3(0, 0, 0), lookToCenter);

            } else if (T < 70) {
                const t = T - 55;
                const p = smoother(t / PHASE3_DUR);
                const softStart = smoother(clamp01(t / 4));
                const a = PHASE2_END_A + (PHASE3_END_A - PHASE2_END_A) * p;
                const r = PHASE2_END_R + (PHASE3_END_R - PHASE2_END_R) * softStart;
                const h = PHASE2_END_H + (PHASE3_END_H - PHASE2_END_H) * softStart;
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = new THREE.Vector3(0, 0, 0);

            } else if (T < 80) {
                const t = T - 70;
                const p = smoother(t / PHASE4_DUR);
                const a = PHASE3_END_A + (PHASE4_END_A - PHASE3_END_A) * p;
                const r = 900 + Math.sin(p * Math.PI) * 600;
                const h = PHASE3_END_H * (1 - p);
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = new THREE.Vector3(0, 0, 0);

            } else if (T < 95) {
                const t = T - 80;
                const p = smoother(t / PHASE5_DUR);
                const a = PHASE4_END_A + (PHASE5_END_A - PHASE4_END_A) * p;
                const r = 900 + (PHASE5_END_R - 900) * p;
                const h = PHASE5_END_H * p;
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = new THREE.Vector3(0, 0, 0);

            } else if (T < TOTAL_DUR) {
                const t = T - 95;
                const p = smoother(t / 7.5);
                const a = PHASE5_END_A + t * 0.12;
                const r = PHASE5_END_R * (1 - p);
                const h = PHASE5_END_H + p * 45000;
                rawPos  = new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r);
                rawLook = new THREE.Vector3(0, 0, 0);

            } else {
                if (cinModelCurrent) applyModelToUi(cinModelCurrent, delta, true);
                finalCinematicOrbitTime = cinStructureTime;
                finalCinematicCameraPos.copy(camera.position);
                finalCinematicCameraLook.copy(camLerpLook);

                stopCinematicSequence();
                return;
            }
            const posDist = camLerpPos.distanceTo(rawPos);
            const lerpP   = Math.min(0.010 + posDist * 0.00000050, 0.022);
            const lerpL   = lerpP * 0.95;

            camLerpPos.lerp(rawPos,   lerpP);
            camLerpLook.lerp(rawLook, lerpL);

            camera.position.copy(camLerpPos);
            camera.lookAt(camLerpLook);

            updateTimer();
        } else if (holdFinalCinematicFrame) {
        }
    }

    // Render
    function animate() {
        requestAnimationFrame(animate);
        update();
        if (!isCinematic) controls.update();
        composer.render();
    }

    createSubtleStars(); createSun(); initPlanets(); animate();

    window.addEventListener('resize', () => {
        restoreScreenResolution();
    });
</script>
